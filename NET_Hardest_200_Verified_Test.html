const VERSION = "NET_HARDEST_200_VERIFIED_2026_06_25";
let answers = JSON.parse(localStorage.getItem(VERSION+"_answers") || "{}");
let timeLeft = parseInt(localStorage.getItem(VERSION+"_timeLeft") || (180*60));
let timerHandle = null;
let currentId = 1;
let activity = JSON.parse(localStorage.getItem(VERSION+"_activity") || "[]");
let perQuestionTime = JSON.parse(localStorage.getItem(VERSION+"_timeByQ") || "{}");
let activeQ = 1;
function decodeKey() { return JSON.parse(atob(KEY_B64)); }
function logActivity(type, detail="") { activity.push({type, detail, at:new Date().toISOString()}); localStorage.setItem(VERSION+"_activity", JSON.stringify(activity)); }
document.addEventListener("visibilitychange",()=>logActivity(document.hidden?"tab_hidden":"tab_visible"));
window.addEventListener("blur",()=>logActivity("window_blur")); window.addEventListener("focus",()=>logActivity("window_focus"));
function render() {
  const paper = document.getElementById("paper");
  paper.innerHTML = QUESTIONS.map(q => `
    <div class="card" id="q${q.id}" onmouseenter="setActive(${q.id})">
      <div class="qhead"><div class="qnum">Q${String(q.id).padStart(3,'0')} - ${q.subject}</div><div class="topic">${q.topic}</div></div>
      <div class="qtext">${q.q}</div>
      ${q.options.map((op,i)=>`<label class="option" id="q${q.id}o${i}"><input type="radio" name="q${q.id}" value="${i}" ${answers[q.id]==i?'checked':''} onchange="selectAnswer(${q.id},${i})"><strong>${String.fromCharCode(65+i)}.</strong> ${op}</label>`).join("")}
      <div class="meta-row"><span>Auto-save enabled</span><span id="timeq${q.id}">Time: ${perQuestionTime[q.id]||0}s</span></div>
    </div>`).join("");
  const nav = document.getElementById("navgrid");
  nav.innerHTML = QUESTIONS.map(q=>`<button class="navbtn ${answers[q.id]!==undefined?'answered':''}" id="nav${q.id}" onclick="goQ(${q.id})">${q.id}</button>`).join("");
  updateCounts(); if(window.MathJax) MathJax.typesetPromise();
}
function setActive(id) { activeQ=id; currentId=id; markCurrent(); }
setInterval(()=>{ perQuestionTime[activeQ]=(perQuestionTime[activeQ]||0)+1; localStorage.setItem(VERSION+"_timeByQ", JSON.stringify(perQuestionTime)); const el=document.getElementById("timeq"+activeQ); if(el) el.textContent="Time: "+perQuestionTime[activeQ]+"s"; },1000);
function selectAnswer(id, val) { answers[id]=val; localStorage.setItem(VERSION+"_answers", JSON.stringify(answers)); logActivity("answer_selected", "Q"+id+"="+String.fromCharCode(65+val)); updateCounts(); }
function updateCounts() { document.getElementById("answeredCount").textContent = Object.keys(answers).length; QUESTIONS.forEach(q=>{ const b=document.getElementById("nav"+q.id); if(b) b.classList.toggle("answered", answers[q.id]!==undefined); }); }
function goQ(id) { currentId=id; activeQ=id; markCurrent(); document.getElementById("q"+id).scrollIntoView({behavior:"smooth", block:"start"}); }
function markCurrent() { document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("current")); const b=document.getElementById("nav"+currentId); if(b) b.classList.add("current"); }
function fmtTime(s) { s=Math.max(0,s); const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60; return [h,m,sec].map(x=>String(x).padStart(2,"0")).join(":"); }
function tick() { timeLeft--; localStorage.setItem(VERSION+"_timeLeft", timeLeft); document.getElementById("timer").textContent=fmtTime(timeLeft); if(timeLeft<=0) { clearInterval(timerHandle); finishTest(); } }
function startTimer() { clearInterval(timerHandle); timeLeft=parseInt(document.getElementById("duration").value)*60; localStorage.setItem(VERSION+"_timeLeft", timeLeft); document.getElementById("timer").textContent=fmtTime(timeLeft); timerHandle=setInterval(tick,1000); logActivity("timer_started", document.getElementById("duration").value+" minutes"); }
function restoreTimer() { document.getElementById("timer").textContent=fmtTime(timeLeft); timerHandle=setInterval(tick,1000); }
function resultPayload() { return { version: VERSION, submittedAt: new Date().toISOString(), totalQuestions: QUESTIONS.length, answers, perQuestionTime, activity }; }
function download(name, text, type) { const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([text],{type})); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
function downloadJSON() { download("NET_Hardest_200_responses.json", JSON.stringify(resultPayload(), null, 2), "application/json"); }
function downloadCSV() {
  let rows=["version,question,subject,topic,selected,selected_text,time_seconds"];
  QUESTIONS.forEach(q=>{ const sel=answers[q.id]; rows.push([VERSION,q.id,q.subject,q.topic,sel===undefined?"":String.fromCharCode(65+sel),sel===undefined?"":q.options[sel],perQuestionTime[q.id]||0].map(v=>`"${String(v).replaceAll('"','""')}"`).join(",")); });
  download("NET_Hardest_200_responses.csv", rows.join("\n"), "text/csv");
}
function finishTest() {
  const key=decodeKey(); let score=0; QUESTIONS.forEach(q=>{ if(Number(answers[q.id])===Number(key[q.id])) score++; });
  const box=document.getElementById("review"); box.style.display="block";
  box.innerHTML=`<h2>Score: ${score} / ${QUESTIONS.length}</h2><p class="small">Review shows selected answers. Correct answers remain hidden unless teacher key is opened.</p>`+
    QUESTIONS.map(q=>`<div class="small"><strong>Q${q.id}</strong> ${q.subject} / ${q.topic} - selected: ${answers[q.id]===undefined?"Blank":String.fromCharCode(65+Number(answers[q.id]))+". "+q.options[answers[q.id]]}</div>`).join("");
  logActivity("test_finished", "score="+score); box.scrollIntoView({behavior:"smooth"});
}
function teacherKey() {
  const pwd=prompt("Teacher password:");
  if(pwd!=="khurram") { alert("Incorrect password."); return; }
  const key=decodeKey(); const box=document.getElementById("review"); box.style.display="block"; let score=0;
  QUESTIONS.forEach(q=>{ if(Number(answers[q.id])===Number(key[q.id])) score++; });
  box.innerHTML=`<h2>Teacher Key and Review</h2><p><strong>Score:</strong> ${score} / ${QUESTIONS.length}</p>`+
    QUESTIONS.map(q=>`<div class="card"><strong>Q${q.id}.</strong> ${q.q}<br><strong>Correct:</strong> ${String.fromCharCode(65+key[q.id])}. ${q.options[key[q.id]]}<br><strong>Selected:</strong> ${answers[q.id]===undefined?"Blank":String.fromCharCode(65+Number(answers[q.id]))+". "+q.options[answers[q.id]]}<br><span class="small">${EXPLANATIONS[q.id]||""}</span></div>`).join("");
  QUESTIONS.forEach(q=>{ const correct=key[q.id], selected=answers[q.id]; const ce=document.getElementById(`q${q.id}o${correct}`); if(ce) ce.classList.add("correct"); if(selected!==undefined && Number(selected)!==Number(correct)) { const we=document.getElementById(`q${q.id}o${selected}`); if(we) we.classList.add("wrong"); } });
  if(window.MathJax) MathJax.typesetPromise(); logActivity("teacher_key_opened");
}
function calc() {
  const s=document.getElementById("calcIn").value;
  if(!/^[0-9+\-*/(). %^]+$/.test(s)) { document.getElementById("calcOut").textContent="Invalid characters"; return; }
  try { const val=Function("return ("+s.replaceAll("^","**")+")")(); document.getElementById("calcOut").textContent=val; } catch(e) { document.getElementById("calcOut").textContent="Error"; }
}
